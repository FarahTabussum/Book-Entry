<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="h-screen overflow-hidden bg-gray-100"
    style="font-family: &quot;Hind Siliguri&quot;, sans-serif"
  >
    <!-- Main Container -->
    <div class="flex h-full">
      <!-- Left Sidebar (1/4) -->
      <aside
        class="w-1/4 bg-white p-8 shadow-lg flex flex-col border-dotted border-r-2 border-gray-300"
      >
        <!-- Logo + Title -->
        <div class="flex items-center gap-5">
          <img src="./images/logo.png" alt="Lumina Logo" class="w-8 h-8" />
          <h1 class="text-3xl font-bold text-gray-800">Lumina</h1>
        </div>

        <!-- Subtitle -->
        <p class="mt-4 text-gray-500 text-lg">Your Personal Library</p>

        <!-- Add Book Button -->
        <button
          class="mt-10 flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-2xl transition duration-300"
        >
          <span class="text-2xl leading-none">+</span>
          <span>Add New Book</span>
        </button>

        <!-- Navigation -->
        <div class="mt-12 flex-1 flex flex-col">
          <div class="space-y-5">
            <!-- Row 1 -->
            <div
              class="flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img src="./images/book.png" alt="All Books" class="w-6 h-6" />
              <span class="text-gray-700 font-medium">All Books</span>
            </div>

            <!-- Row 2 -->
            <div
              class="flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img
                src="./images/ssave.png"
                alt="Currently Reading"
                class="w-6 h-6"
              />
              <span class="text-gray-700 font-medium">Currently Reading</span>
            </div>

            <!-- Row 3 -->
            <div
              class="flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img src="./images/tick.png" alt="Read Books" class="w-6 h-6" />
              <span class="text-gray-700 font-medium">Finished</span>
            </div>

            <!-- Row 4 -->
            <div
              class="flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img src="./images/save.png" alt="Wishlist" class="w-6 h-6" />
              <span class="text-gray-700 font-medium">Wishlist</span>
            </div>
          </div>

          <!-- Dotted Divider -->

          <!-- Bottom Section -->
          <div class="mt-auto">
            <hr class="-mx-8 mb-5 border-t-2 border-dotted border-gray-300" />

            <!-- Row 1 -->
            <div
              class="flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img src="./images/mark.png" alt="Help" class="w-6 h-6" />
              <span class="text-gray-700 font-medium">Help</span>
            </div>

            <!-- Row 2 -->
            <div
              class="mt-5 flex items-center gap-5 cursor-pointer hover:text-orange-500 transition"
            >
              <img src="./images/log.png" alt="Logout" class="w-6 h-6" />
              <span class="text-gray-700 font-medium">Logout</span>
            </div>
          </div>
          ,
        </div>
      </aside>

      <!-- Right Content (3/4) -->
      <main class="w-3/4 overflow-y-auto">
        <!-- Temporary content -->
        <nav class="flex items-center justify-between mb-8 p-3 bg-white">
          <!-- Search Bar -->
          <div
            class="flex items-center gap-3 w-96 px-4 py-3 bg-gray-100 rounded-xl shadow-sm border border-gray-200"
          >
            <img src="./images/search.png" alt="Search" class="w-5 h-5" />
            <input
              type="text"
              placeholder="Search books..."
              class="w-full outline-none text-gray-700 placeholder-gray-400"
            />
          </div>

          <!-- Icon Buttons -->
          <div class="flex items-center gap-4">
            <button
              class="w-11 h-11 bg-white rounded-xl shadow-sm flex items-center justify-center hover:bg-gray-100 transition"
            >
              <img src="./images/bell.png" alt="Icon 1" class="w-5 h-5" />
            </button>

            <button
              class="w-11 h-11 bg-white rounded-xl shadow-sm flex items-center justify-center hover:bg-gray-100 transition"
            >
              <img src="./images/setting.png" alt="Icon 2" class="w-5 h-5" />
            </button>

            <button
              class="w-11 h-11 bg-white rounded-xl shadow-sm flex items-center justify-center hover:bg-gray-100 transition"
            >
              <img src="./images/User.png" alt="Icon 3" class="w-10 h-10" />
            </button>
          </div>
        </nav>
        <!-- Page Content -->
        <div class="p-6">
          <!-- Heading -->
          <p class="text-5xl font-bold text-gray-900">Book Entry & Tasks</p>

          <!-- Description -->
          <p class="mt-2 text-gray-500 text-lg">
            Organize your reading journey and track your progress.
          </p>

          <!-- Main Section -->
          <div class="mt-8 flex gap-6">
            <!-- Left Section (3/4) -->
            <div class="w-3/4 bg-white rounded-2xl shadow p-6">
              <!-- Header -->
              <div class="flex items-center gap-3 mb-6">
                <img src="./images/bb (1).png" alt="Add Book" class="w-6 h-6" />
                <p class="text-lg font-semibold text-gray-800">Add New Book</p>
              </div>

              <!-- Book Title -->
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                  Book Title
                </label>

                <input
                  type="text"
                  placeholder="e.g. The Overstory"
                  class="w-full px-4 py-3 border border-gray-300 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-gray-600"
                />
              </div>

              <!-- Author + Genre Row -->
              <div class="grid grid-cols-2 gap-4 mt-5">
                <!-- Author -->
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                    Author
                  </label>

                  <input
                    type="text"
                    placeholder="e.g. Richard Powers"
                    class="w-full px-4 py-3 border border-gray-300 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-gray-600"
                  />
                </div>

                <!-- Genre -->
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                    Genre
                  </label>

                  <div class="relative">
                    <!-- Selected Value -->
                    <button
                      id="genre-btn"
                      type="button"
                      class="w-full flex items-center bg-gray-100 justify-between px-4 py-3 border border-gray-300 rounded-xl text-gray-500 focus:ring-2 focus:ring-gray-600"
                    >
                      <span id="selected-genre">Select Genre</span>

                      <img
                        src="./images/arrow.png"
                        alt="Arrow"
                        class="w-4 h-4"
                      />
                    </button>

                    <!-- Dropdown -->
                    <ul
                      id="genre-menu"
                      class="hidden absolute left-0 mt-2 w-full bg-white border border-gray-300 rounded-xl shadow-lg overflow-hidden z-10"
                    >
                      <li
                        class="genre-option px-4 py-3 hover:bg-gray-200 cursor-pointer"
                      >
                        Fiction
                      </li>

                      <li
                        class="genre-option px-4 py-3 hover:bg-gray-200 cursor-pointer"
                      >
                        Adventure
                      </li>

                      <li
                        class="genre-option px-4 py-3 hover:bg-gray-200 cursor-pointer"
                      >
                        Horror
                      </li>

                      <li
                        class="genre-option px-4 py-3 hover:bg-gray-200 cursor-pointer"
                      >
                        Romance
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <!-- Date + Total Pages -->
              <div class="grid grid-cols-2 gap-4 mt-5">
                <!-- Finish Date -->
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                    Start Date
                  </label>

                  <div
                    class="flex items-center gap-3 px-4 py-3 border border-gray-300 rounded-xl bg-gray-100 focus-within:ring-2 focus-within:ring-orange-400"
                  >
                    <img
                      src="./images/calendar.png"
                      alt="Calendar"
                      class="w-5 h-5"
                    />

                    <input
                      type="date"
                      class="w-full bg-transparent outline-none text-gray-700"
                    />
                  </div>
                </div>

                <!-- Total Pages -->
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                    Total Pages (Optional)
                  </label>

                  <input
                    placeholder="e.g. 502"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-100 outline-none focus:ring-2 focus:ring-orange-400"
                  />
                </div>
              </div>

              <!-- Buttons -->
              <div class="flex justify-end gap-4 mt-8">
                <!-- Clear -->
                <button
                  type="button"
                  class="px-6 py-3 border border-black rounded-xl bg-gray-200 hover:bg-gray-400 transition duration-300"
                >
                  Clear
                </button>

                <!-- Save -->
                <button
                  type="submit"
                  class="px-6 py-3 rounded-xl bg-orange-500 text-white hover:bg-orange-600 transition duration-300"
                >
                  Save Book
                </button>
              </div>
            </div>

            <!-- Right Section (1/4) -->
            <div class="w-1/4 bg-white rounded-2xl shadow p-6">
              <!-- Your task panel goes here -->
            </div>
          </div>
        </div>

        <!-- Rest of your page -->
        <div id="book-list" class="space-y-6">
          <!-- Book cards will go here -->
        </div>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>
